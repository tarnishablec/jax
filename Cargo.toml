[package]
name = "jax"
version = "0.1.0"
edition = "2024"

[lib]
name = "jax"
crate-type = ["rlib"]


[dependencies]
petgraph = { version = "0.8.3", default-features = false, features = ["stable_graph"] }
async-trait = "0.1.89"
uuid = { version = "1.22.0", features = ["v4"] }
futures = { version = "0.3.32", default-features = false, features = ["alloc"] }
downcast-rs = { version = "2.0.2", default-features = false, features = ["sync"] }

[lints.clippy]
unwrap_used = "deny"
