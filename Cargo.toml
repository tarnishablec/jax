[package]
name = "jax"
version = "0.1.0"
edition = "2024"

[lib]
name = "jax"
crate-type = ["rlib"]


[dependencies]
petgraph = { version = "0.8.3", default-features = false, features = ["stable_graph"] }
async-trait = "0.1.89"
uuid = { version = "1.22.0", features = ["v4"] }
tracing = "0.1.44"
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
heck = "0.5.0"
async-lock = { version = "3.4.2", default-features = false, features = [] }

[lints.clippy]
unwrap_used = "deny"
