[package]
name = "jax"
version = "0.1.0"
edition = "2024"

[lib]
name = "jax"
crate-type = ["rlib"]


[dependencies]
petgraph = { version = "0.8.3", default-features = false, features = [] }
async-trait = "0.1.89"
uuid = { version = "1.22.0", features = ["v4"] }
tauri = "2.10.3"
tracing = "0.1.44"
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
heck = "0.5.0"

[lints.clippy]
unwrap_used = "deny"
