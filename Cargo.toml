[workspace]
resolver = "3"
members = [
    "crates/jax",
    "crates/jax-probes",
]

[workspace.package]
edition = "2024"
version = "0.2.0"

[workspace.dependencies]
jax = { path = "crates/jax" }
uuid = { version = "1.23.0", features = ["v4"] }
async-trait = "0.1.89"
futures = { version = "0.3.32", default-features = false, features = ["alloc"] }

[workspace.lints.clippy]
unwrap_used = "deny"
